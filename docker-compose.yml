version: '3.8'

services:
  # ============================================
  # Databases & Storage
  # ============================================
  
  postgres:
    image: postgres:15-alpine
    container_name: mailmind-postgres
    environment:
      POSTGRES_DB: mailmind
      POSTGRES_USER: mailmind
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mailmind_dev_password}
      POSTGRES_INITDB_ARGS: "-E UTF8 --locale=C"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mailmind"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mailmind-network

  redis:
    image: redis:7-alpine
    container_name: mailmind-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-mailmind_dev_password}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mailmind-network

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: mailmind-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: mailmind
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-mailmind_dev_password}
      RABBITMQ_DEFAULT_VHOST: mailmind
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"   # AMQP port
      - "15672:15672" # Management UI
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - mailmind-network

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.0
    container_name: mailmind-elasticsearch
    environment:
      - discovery.type=single-node
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
      - xpack.security.enabled=false
      - xpack.security.enrollment.enabled=false
    volumes:
      - elasticsearch_data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
      - "9300:9300"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - mailmind-network

  minio:
    image: minio/minio:latest
    container_name: mailmind-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"  # API port
      - "9001:9001"  # Console port
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      - mailmind-network

  # ============================================
  # Backend Services (Temel yapı - sonra eklenecek)
  # ============================================
  
